{% extends 'base.html' %}

{% block title %}Confirmer la suppression - Gestion de Stock{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card border-danger shadow-sm">
            <div class="card-body p-4">
                <h3 class="card-title text-danger mb-3">
                    <i class="bi bi-exclamation-triangle"></i> Confirmer la suppression
                </h3>
                
                <p class="card-text">
                    Êtes-vous sûr de vouloir supprimer le fournisseur <strong>{{ fournisseur.nom }}</strong> ?
                </p>
                <p class="text-muted small">
                    Cette action est irréversible.
                </p>
                
                <form method="post" class="d-flex gap-2 mt-4">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash"></i> Supprimer
                    </button>
                    <a href="{% url 'fournisseurs_liste' %}" class="btn btn-outline-secondary">
                        <i class="bi bi-x-circle"></i> Annuler
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
