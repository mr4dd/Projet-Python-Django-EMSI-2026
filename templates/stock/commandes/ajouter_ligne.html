{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Ajouter une ligne de commande - Gestion de Stock{% endblock %}

{% block content %}
<h1 class="mb-4">Ajouter une ligne à BC-{{ bon.pk|stringformat:"04d" }}</h1>

<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    
                    <div class="mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle"></i> Ajouter
                        </button>
                        <a href="{% url 'commandes_detail' bon.pk %}" class="btn btn-outline-secondary">
                            <i class="bi bi-x-circle"></i> Annuler
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
